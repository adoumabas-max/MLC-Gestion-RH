<!DOCTYPE html>
<!--
  MLC-Gestion-RH — Application RH de Mercure Logistics SARL (Transit & Logistique, Douala)
  Variante A : application MONO-FICHIER, autonome et hors-ligne (HTML + CSS + JS natif).
  Cahier des charges MLC-RH-CDC-001 v1.0 — ISO 9001:2015 + Code du travail camerounais (Loi n° 92/007).

  Moteur de paie STRICTEMENT identique à la variante B (Spring Boot) : même cas de référence
  bloquant — base 350 000 => net 302 792 / coût employeur 406 700 (bouton « Auto-test paie », M15).
  Persistance : localStorage (clé "mlc_rh"), avec export/import JSON et repli mémoire.
  Aucune dépendance externe, aucun CDN, aucun appel réseau.
-->
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>MLC-Gestion-RH — Mercure Logistics</title>
<style>
  /* ===== Identité visuelle MLC (§3.5) ===== */
  :root{
    --marine:#0A1F33; --marine2:#1F4E79; --petrole:#14506B; --or:#B8860B;
    --clair:#F2F2F2; --blanc:#fff; --gris:#6b7280; --rouge:#b91c1c; --vert:#15803d;
    --bord:#d8dee6;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,Arial,sans-serif;background:var(--clair);color:#1a2330}
  a{color:var(--marine2)}
  /* Barre supérieure */
  .topbar{background:var(--marine);color:#fff;display:flex;align-items:center;gap:16px;padding:10px 18px;position:sticky;top:0;z-index:20}
  .logo{font-weight:800;letter-spacing:1px;font-size:18px;line-height:1}
  .logo small{display:block;font-weight:400;font-size:11px;color:#c9d6e5;letter-spacing:.5px}
  .topbar .spacer{flex:1}
  .topbar select,.topbar button{font:inherit}
  .selsoc{background:var(--marine2);color:#fff;border:1px solid #335f8a;border-radius:6px;padding:6px 10px}
  .user{font-size:13px;color:#c9d6e5}
  /* Mise en page */
  .layout{display:flex;min-height:calc(100vh - 49px)}
  .side{width:230px;background:#0d2742;color:#cdd9e7;padding:8px 0;flex-shrink:0}
  .side a{display:block;padding:9px 16px;color:#cdd9e7;text-decoration:none;font-size:13.5px;border-left:3px solid transparent;cursor:pointer}
  .side a:hover{background:#143358}
  .side a.actif{background:var(--marine2);color:#fff;border-left-color:var(--or);font-weight:600}
  .side .grp{font-size:11px;text-transform:uppercase;color:#7e98b4;padding:12px 16px 4px;letter-spacing:.6px}
  .main{flex:1;padding:20px 26px;overflow:auto}
  h1{font-size:21px;margin:0 0 4px;color:var(--marine)}
  .sub{color:var(--gris);font-size:13px;margin-bottom:16px}
  /* Cartes / tableaux */
  .card{background:#fff;border:1px solid var(--bord);border-radius:10px;padding:16px 18px;margin-bottom:16px;box-shadow:0 1px 2px rgba(10,31,51,.04)}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{padding:8px 10px;text-align:left;border-bottom:1px solid #eceff3}
  thead th{background:var(--marine);color:#fff;font-weight:600}
  tbody tr:hover{background:#f7f9fc}
  .right{text-align:right}
  /* Formulaires */
  label{display:block;font-size:12.5px;color:#33414f;margin:8px 0 3px;font-weight:600}
  input,select,textarea{width:100%;padding:8px 9px;border:1px solid #c7d0db;border-radius:6px;font:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:2px solid #b9cbe0;border-color:var(--marine2)}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:6px 16px}
  .btn{display:inline-block;background:var(--marine2);color:#fff;border:none;border-radius:7px;padding:9px 16px;font:inherit;font-weight:600;cursor:pointer}
  .btn:hover{background:var(--marine)}
  .btn.sec{background:#e7edf4;color:var(--marine)}
  .btn.or{background:var(--or)}
  .btn.danger{background:var(--rouge)}
  .btn.sm{padding:5px 10px;font-size:12.5px}
  .row-actions{display:flex;gap:6px}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:600}
  .pill.ok{background:#dcfce7;color:var(--vert)} .pill.no{background:#fee2e2;color:var(--rouge)}
  .pill.info{background:#e0e7ff;color:#3730a3}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px}
  .kpi{background:linear-gradient(135deg,var(--marine),var(--petrole));color:#fff;border-radius:12px;padding:16px}
  .kpi .v{font-size:26px;font-weight:800;margin-top:6px}
  .kpi .l{font-size:12px;color:#cfe0ee;text-transform:uppercase;letter-spacing:.5px}
  .msg{padding:10px 14px;border-radius:8px;margin:8px 0;font-size:13.5px}
  .msg.err{background:#fee2e2;color:#7f1d1d;border:1px solid #fca5a5}
  .msg.ok{background:#dcfce7;color:#14532d;border:1px solid #86efac}
  /* Wizard */
  .steps{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
  .steps .s{flex:1;min-width:120px;text-align:center;padding:8px;border-radius:8px;background:#e7edf4;color:#5b6b7c;font-size:12.5px;font-weight:600}
  .steps .s.on{background:var(--marine2);color:#fff}
  .steps .s.done{background:#cfe3d4;color:#14532d}
  .bull{font-size:13px}
  .bull td{padding:5px 8px}
  .bull .tot{font-weight:800;background:#f1f5fb}
  .muted{color:var(--gris)}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  @media(max-width:760px){.twocol{grid-template-columns:1fr}.side{width:64px}.side a{font-size:0;padding:12px 6px}.side .grp{display:none}}
  /* Impression : on isole #print-area */
  #print-area{display:none}
  @media print{
    body *{visibility:hidden}
    #print-area,#print-area *{visibility:visible}
    #print-area{display:block;position:absolute;left:0;top:0;width:100%;padding:24px}
    .noprint{display:none!important}
  }
  .doc{max-width:760px;margin:0 auto;font-size:13px;color:#111}
  .doc .head{display:flex;justify-content:space-between;border-bottom:2px solid var(--marine);padding-bottom:8px;margin-bottom:14px}
  .doc h2{color:var(--marine);margin:0}
  .doc .foot{margin-top:26px;border-top:1px solid #ccc;padding-top:8px;font-size:11px;color:#555;display:flex;justify-content:space-between}
</style>
</head>
<body>
<div class="topbar noprint">
  <div class="logo">MERCURE LOGISTICS<small>Transit &amp; Logistique – Douala</small></div>
  <span class="spacer"></span>
  <label style="margin:0;color:#cfe0ee;font-weight:600;font-size:12px">Société&nbsp;</label>
  <select id="selSoc" class="selsoc" onchange="App.changeSoc(this.value)"></select>
  <span class="user" id="userBox"></span>
</div>
<div class="layout">
  <nav class="side noprint" id="menu"></nav>
  <main class="main" id="view"></main>
</div>
<div id="print-area"></div>

<script>
"use strict";
/* ============================================================================
   1) PARAMÈTRES LÉGAUX (M15 — source unique de vérité). Identiques à la variante B.
   ============================================================================ */
const PARAMS = {
  smig: 60000,                 // SMIG mensuel (contrôle bloquant) — Art. SMIG
  plafondCnps: 750000,         // plafond assiette PVID
  pvidSal: 0.042, pvidPat: 0.042,
  allocFam: 0.07,              // allocations familiales (employeur)
  accidentTravail: 0.025,      // accident du travail (employeur)
  cfcSal: 0.01, cfcPat: 0.015, // Crédit Foncier
  fne: 0.01,                   // Fonds National de l'Emploi
  cac: 0.10,                   // centimes additionnels communaux (10% IRPP)
  partFraisPro: 0.70,          // abattement frais pro 30% (on conserve 70%)
  abattForfaitIRPP: 41667,     // 500 000 / 12
  // Barème IRPP mensuel progressif (Art. barème annuel / 12)
  baremeIRPP: [ {plafond:166667,taux:0.10},{plafond:250000,taux:0.15},
                {plafond:416667,taux:0.25},{plafond:Infinity,taux:0.35} ],
  // RAV — redevance audiovisuelle (mensuel, par tranche de SBT)
  baremeRav: [ {max:50000,v:0},{max:100000,v:750},{max:200000,v:1950},{max:300000,v:3250},
               {max:400000,v:4550},{max:500000,v:5850},{max:600000,v:7150},{max:700000,v:8450},
               {max:800000,v:9750},{max:900000,v:11050},{max:1000000,v:12350},{max:Infinity,v:13000} ],
  // TDL — taxe de développement local (mensuel, calibré sur le cas de référence)
  baremeTdl: [ {max:100000,v:500},{max:200000,v:1000},{max:300000,v:1500},{max:400000,v:2500},
               {max:500000,v:3000},{max:700000,v:4000},{max:Infinity,v:5000} ],
  // Indemnité de licenciement (Art. 37) : % du salaire mensuel moyen, par année d'ancienneté
  indemnite: [ {maxAns:5,taux:0.20},{maxAns:10,taux:0.25},{maxAns:15,taux:0.30},{maxAns:Infinity,taux:0.35} ]
};
const SOCIETES = ["MLC","MLC RCA","TRANSEXPRESS"];

/* ============================================================================
   2) MOTEUR DE PAIE — algorithme déterministe (§3.3). Arrondi entier (FCFA).
   ============================================================================ */
function bareme(tab, x){ for(const p of tab){ if(x<=p.max) return p.v; } return 0; }
function baremeIRPP(base){
  let irpp=0, prev=0;
  for(const t of PARAMS.baremeIRPP){
    if(base>prev){ irpp += (Math.min(base,t.plafond)-prev)*t.taux; prev=t.plafond; } else break;
  }
  return Math.round(irpp);
}
function calculePaie(salaireBase, primesImposables=0, primesNonImposables=0, majorationsHS=0){
  const P=PARAMS;
  const sbt = salaireBase + primesImposables + majorationsHS;          // salaire brut taxable
  // --- Retenues salariales ---
  const pvidSal = Math.round(P.pvidSal*Math.min(sbt,P.plafondCnps));    // Art. CNPS
  const baseIRPP = Math.max(0, Math.round(sbt*P.partFraisPro) - pvidSal - P.abattForfaitIRPP);
  const irpp = baremeIRPP(baseIRPP);
  const cac  = Math.round(P.cac*irpp);
  const cfcSal = Math.round(P.cfcSal*sbt);
  const rav = bareme(P.baremeRav, sbt);
  const tdl = bareme(P.baremeTdl, sbt);
  const totalRetenues = pvidSal+irpp+cac+cfcSal+rav+tdl;
  const netAPayer = sbt + primesNonImposables - totalRetenues;
  // --- Charges patronales ---
  const pvidPat = Math.round(P.pvidPat*Math.min(sbt,P.plafondCnps));
  const allocFam = Math.round(P.allocFam*sbt);
  const accident = Math.round(P.accidentTravail*sbt);
  const cfcPat = Math.round(P.cfcPat*sbt);
  const fne = Math.round(P.fne*sbt);
  const totalPatronal = pvidPat+allocFam+accident+cfcPat+fne;
  const coutEmployeur = sbt + totalPatronal;
  return {sbt,pvidSal,irpp,cac,cfcSal,rav,tdl,totalRetenues,netAPayer,
          pvidPat,allocFam,accident,cfcPat,fne,totalPatronal,coutEmployeur};
}
function salaireValide(s){ return s>=PARAMS.smig; }
/** Test d'acceptation bloquant : base 350 000 => net 302 792 / coût 406 700. */
function autoTestPaie(){
  const r=calculePaie(350000);
  const att={pvidSal:14700,irpp:19962,cac:1996,cfcSal:3500,rav:4550,tdl:2500,
             totalRetenues:47208,netAPayer:302792,pvidPat:14700,allocFam:24500,
             accident:8750,cfcPat:5250,fne:3500,totalPatronal:56700,coutEmployeur:406700};
  const ecarts=[];
  for(const k in att){ if(r[k]!==att[k]) ecarts.push(`${k}: obtenu ${r[k]}, attendu ${att[k]}`); }
  return {ok:ecarts.length===0, ecarts, r, att};
}

/* ============================================================================
   3) PERSISTANCE — localStorage (clé "mlc_rh") + repli mémoire + export/import.
   ============================================================================ */
const Store = (function(){
  const KEY="mlc_rh";
  let mem=null; // repli si localStorage indisponible
  function dispo(){ try{ const k="__t"; localStorage.setItem(k,"1"); localStorage.removeItem(k); return true; }catch(e){ return false; } }
  const useLS=dispo();
  function vide(){ return {salaries:[],contrats:[],bulletins:[],conges:[],disciplines:[],departs:[],
                           postes:[],avances:[],temps:[],audit:[],utilisateurs:[],seq:{},params:null,socActive:"MLC"}; }
  function read(){
    if(useLS){ const s=localStorage.getItem(KEY); return s?JSON.parse(s):null; }
    return mem;
  }
  function write(d){ if(useLS) localStorage.setItem(KEY,JSON.stringify(d)); else mem=d; }
  function init(){ let d=read(); if(!d){ d=seed(); write(d); } if(!d.params) d.params=null; return d; }
  function next(d,coll){ d.seq[coll]=(d.seq[coll]||0)+1; return d.seq[coll]; }
  return {KEY,read,write,init,next,vide,useLS};
})();

/* Données de démonstration (seed léger, multi-sociétés) */
function seed(){
  const d=Store.vide();
  d.postes=[
    {id:1,societe:"MLC",intitule:"Déclarant en douane",service:"Exploitation",categorie:"V"},
    {id:2,societe:"MLC",intitule:"Chauffeur corridor",service:"Transport",categorie:"III"},
    {id:3,societe:"MLC",intitule:"Responsable des opérations",service:"Direction",categorie:"IX"}
  ];
  d.seq.postes=3;
  d.salaries=[{id:1,societe:"MLC",matricule:"MLC-001",matCnps:"CM-100200",nom:"NGUE",prenom:"Paul",
    naissance:"1990-04-12",sexe:"M",nationalite:"Camerounaise",situation:"Marié",enfants:2,
    poste:"Déclarant en douane",service:"Exploitation",categorie:"V",embauche:"2025-02-01",
    salaireBase:350000,statut:"Actif",tel:"690000000"}];
  d.seq.salaries=1;
  d.contrats=[{id:1,societe:"MLC",salarieId:1,type:"CDI",debut:"2025-02-01",fin:"",essaiMois:3,salaire:350000,statut:"En cours"}];
  d.seq.contrats=1;
  d.utilisateurs=[
    {login:"drh",role:"DRH",societe:"MLC"},{login:"paie",role:"PAIE",societe:"MLC"},
    {login:"audit",role:"AUDITEUR",societe:"MLC"}];
  d.audit=[{id:1,horodatage:new Date().toISOString(),acteur:"system",action:"Initialisation",
    detail:"Amorçage des données de démonstration",societe:"MLC"}];
  d.seq.audit=1;
  return d;
}

/* ============================================================================
   4) HELPERS
   ============================================================================ */
const fmt = n => (n==null||isNaN(n))?"0":Math.round(n).toLocaleString("fr-FR");
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function soc(d){ return d.socActive||"MLC"; }
function bySoc(arr,d){ return (arr||[]).filter(x=>x.societe===soc(d)); }
function salById(d,id){ return d.salaries.find(s=>s.id===Number(id)); }
function audit(d,action,detail){
  const id=Store.next(d,"audit");
  d.audit.unshift({id,horodatage:new Date().toISOString(),acteur:(App.user&&App.user.login)||"drh",
    action,detail,societe:soc(d)});
}
function moisEntre(dateISO){
  if(!dateISO) return 0;
  const a=new Date(dateISO), b=new Date();
  return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()) - (b.getDate()<a.getDate()?1:0);
}

/* ============================================================================
   5) APPLICATION — routeur, menu, modules, wizards
   ============================================================================ */
const App = {
  d:null, route:"M09", user:{login:"drh",role:"DRH"},
  wiz:null, // état courant d'un wizard

  start(){
    this.d=Store.init();
    if(this.d.params){ Object.assign(PARAMS,this.d.params); }
    // sélecteur société
    const sel=document.getElementById("selSoc");
    sel.innerHTML=SOCIETES.map(s=>`<option ${s===soc(this.d)?"selected":""}>${s}</option>`).join("");
    document.getElementById("userBox").textContent=`Connecté : ${this.user.login} (${this.user.role})`;
    this.renderMenu();
    this.go(this.route);
  },
  save(){ Store.write(this.d); },
  changeSoc(s){ this.d.socActive=s; this.save(); this.go(this.route); },

  MODULES:[
    {g:"Pilotage"},
    {c:"M09",t:"Tableau de bord"},
    {g:"Personnel"},
    {c:"M01",t:"Dossiers salariés"},
    {c:"M02",t:"Contrats"},
    {c:"M11",t:"Organisation & postes"},
    {g:"Cycle de vie"},
    {c:"M03",t:"Paie (W2)"},
    {c:"M04",t:"Congés (W3)"},
    {c:"M05",t:"Discipline (W4)"},
    {c:"M06",t:"Départs (W5)"},
    {g:"Déclarations"},
    {c:"M07",t:"CNPS / DIPE"},
    {c:"M08",t:"Fiscal / DSF"},
    {g:"Autres"},
    {c:"M10",t:"Documents"},
    {c:"M12",t:"Temps de travail"},
    {c:"M13",t:"Avances & prêts"},
    {c:"M14",t:"Administration"},
    {c:"M15",t:"Paramétrage légal"}
  ],
  renderMenu(){
    document.getElementById("menu").innerHTML=this.MODULES.map(m=>
      m.g?`<div class="grp">${m.g}</div>`
         :`<a data-c="${m.c}" class="${m.c===this.route?'actif':''}" onclick="App.go('${m.c}')">${m.t}</a>`
    ).join("");
  },
  go(c){ this.route=c; this.wiz=null; this.renderMenu(); (this["view_"+c]||this.view_todo).call(this); },
  go2(c,arg){ this.route=c; this.wiz=null; this.renderMenu(); (this["view_"+c]||this.view_todo).call(this,arg); },
  set(html){ document.getElementById("view").innerHTML=html; },

  /* ---------- M09 Tableau de bord ---------- */
  view_M09(){
    const d=this.d, actifs=bySoc(d.salaries,d).filter(s=>s.statut==="Actif");
    const masse=actifs.reduce((a,s)=>a+(s.salaireBase||0),0);
    const cout=actifs.reduce((a,s)=>a+calculePaie(s.salaireBase||0).coutEmployeur,0);
    const nbBul=bySoc(d.bulletins,d).length;
    const t=autoTestPaie();
    this.set(`
      <h1>Tableau de bord</h1><div class="sub">Société ${esc(soc(d))} — synthèse RH</div>
      <div class="kpis">
        <div class="kpi"><div class="l">Effectif actif</div><div class="v">${actifs.length}</div></div>
        <div class="kpi"><div class="l">Masse salariale (brut)</div><div class="v">${fmt(masse)}</div></div>
        <div class="kpi"><div class="l">Coût employeur estimé</div><div class="v">${fmt(cout)}</div></div>
        <div class="kpi"><div class="l">Bulletins validés</div><div class="v">${nbBul}</div></div>
      </div>
      <div class="card" style="margin-top:16px">
        <b>Contrôle de conformité du moteur de paie</b>
        <p class="bull">Cas de référence client (base 350 000) :
          ${t.ok?`<span class="pill ok">✅ Conforme</span> net 302 792 / coût 406 700`
                :`<span class="pill no">❌ Non conforme</span> ${esc(t.ecarts.join(' ; '))}`}</p>
      </div>`);
  },

  /* ---------- M01 Dossiers salariés ---------- */
  view_M01(){
    const d=this.d, list=bySoc(d.salaries,d);
    this.set(`
      <h1>Dossiers salariés</h1><div class="sub">M01 — matricule interne + CNPS (${esc(soc(d))})</div>
      <div class="card noprint">
        <button class="btn" onclick="App.wizEmbauche()">➕ Nouvelle embauche (W1)</button>
      </div>
      <div class="card">
        <table><thead><tr><th>Matricule</th><th>Nom & prénom</th><th>Poste</th><th>Catégorie</th>
          <th class="right">Salaire base</th><th>Statut</th><th class="noprint"></th></tr></thead>
        <tbody>${list.length?list.map(s=>`
          <tr><td>${esc(s.matricule)}</td><td>${esc(s.nom)} ${esc(s.prenom||"")}</td>
            <td>${esc(s.poste||"")}</td><td>${esc(s.categorie||"")}</td>
            <td class="right">${fmt(s.salaireBase)}</td>
            <td><span class="pill ${s.statut==="Actif"?"ok":"no"}">${esc(s.statut)}</span></td>
            <td class="noprint row-actions">
              <button class="btn sec sm" onclick="App.go('M03');" title="Paie">Paie</button>
              <button class="btn danger sm" onclick="App.delSal(${s.id})">Suppr.</button></td></tr>`).join("")
          :`<tr><td colspan="7" class="muted">Aucun salarié pour cette société.</td></tr>`}</tbody></table>
      </div>`);
  },
  delSal(id){ const d=this.d; const s=salById(d,id); if(!s) return;
    if(!confirm(`Supprimer ${s.nom} ${s.prenom||""} ?`)) return;
    d.salaries=d.salaries.filter(x=>x.id!==id); audit(d,"Suppression salarié",s.matricule); this.save(); this.go("M01"); },

  /* ---------- W1 Embauche (6 étapes condensées en un formulaire validé) ---------- */
  wizEmbauche(){
    const d=this.d;
    this.set(`
      <h1>W1 — Embauche</h1><div class="sub">Identité → poste → contrat (Art. 25/28) → essai (Art. 34) → CNPS → édition</div>
      <div class="steps">
        <div class="s on">1. Identité</div><div class="s on">2. Poste</div><div class="s on">3. Contrat</div>
        <div class="s on">4. Essai</div><div class="s on">5. CNPS</div><div class="s">6. Contrat PDF</div></div>
      <div id="w1msg"></div>
      <div class="card"><div class="grid">
        <div><label>Matricule interne *</label><input id="e_mat" value="MLC-${String((d.seq.salaries||0)+1).padStart(3,'0')}"></div>
        <div><label>Matricule CNPS</label><input id="e_cnps"></div>
        <div><label>Nom *</label><input id="e_nom"></div>
        <div><label>Prénom</label><input id="e_pre"></div>
        <div><label>Date de naissance</label><input id="e_nais" type="date"></div>

    const prec=bySoc(d.bulletins,d).filter(b=>b.salarieId===sid).slice(-1)[0];

    return Math.max(0,acquis-pris);

  tauxIndemnite(ans){ for(const t of PARAMS.indemnite){ if(ans<=t.maxAns) return t.taux; } return 0.35; },
  view_M06(){
    const d=this.d, actifs=bySoc(d.salaries,d).filter(s=>s.statut==="Actif"), list=bySoc(d.departs,d);
    this.set(`

      <div id="dp_res"></div>

      <tbody>${list.length?list.map(x=>{const s=salById(d,x.salarieId)||{};return `<tr><td>${esc(s.matricule||"?")}</td><td>${esc(x.dateDepart)}</td><td>${esc(x.motif)}</td><td class="right">${fmt(x.indemnite)}</td>
        <td class="noprint"><button class="btn sec sm" onclick="App.imprimerCertificat(${x.salarieId})">Certificat</button></td></tr>`;}).join("")
        :`<tr><td colspan="5" class="muted">Aucun départ.</td></tr>`}</tbody></table></div>`);
  },
  w5Calc(){
    const d=this.d, sid=Number(document.getElementById("dp_sal").value), s=salById(d,sid);
    if(!s) return;
    const motif=document.getElementById("dp_motif").value;
    const preavisMois=Number(document.getElementById("dp_preavis").value||0);
    const dateDep=document.getElementById("dp_date").value;
    const ans=Math.max(0,Math.floor(moisEntre(s.embauche)/12));
    const taux=this.tauxIndemnite(ans);
    // Indemnité Art. 37 : taux × salaire mensuel × années (uniquement licenciement)
    const indemnite = (motif==="Licenciement"&&ans>=1)? Math.round(taux*s.salaireBase*ans):0;
    const preavis = Math.round(preavisMois*s.salaireBase);
    const soldeCg = this.soldeConges(sid);
    const indemCg = Math.round(soldeCg*(s.salaireBase/26));   // congés non pris (base 26 j ouvrables)
    const total = indemnite+preavis+indemCg;
    this.wiz={sid,dateDep,motif,indemnite,total};
    document.getElementById("dp_res").innerHTML=`
      <div class="card"><b>Solde de tout compte — ${esc(s.nom)} ${esc(s.prenom||"")}</b>
      <table class="bull" style="margin-top:8px"><tbody>
        <tr><td>Ancienneté</td><td class="right">${ans} an(s)</td></tr>
        <tr><td>Indemnité de préavis (${preavisMois} mois)</td><td class="right">${fmt(preavis)}</td></tr>
        <tr><td>Indemnité de licenciement (Art. 37 — ${Math.round(taux*100)}%/an)</td><td class="right">${fmt(indemnite)}</td></tr>
        <tr><td>Congés non pris (${soldeCg} j)</td><td class="right">${fmt(indemCg)}</td></tr>
        <tr><td class="tot">TOTAL SOLDE DE TOUT COMPTE</td><td class="right tot">${fmt(total)}</td></tr>
      </tbody></table>
      <div class="row-actions noprint"><button class="btn or" onclick="App.w5Valider()">Valider le départ &amp; éditer le certificat</button></div></div>`;
  },
  w5Valider(){
    const d=this.d, w=this.wiz; if(!w) return; const s=salById(d,w.sid);
    const id=Store.next(d,"departs");
    d.departs.push({id,societe:soc(d),salarieId:w.sid,dateDepart:w.dateDep,motif:w.motif,indemnite:w.total});
    s.statut="Sorti";
    audit(d,"Départ validé (W5)",`${s.matricule} — ${w.motif} — solde ${fmt(w.total)}`);
    this.save(); this.imprimerCertificat(w.sid);
  },

  periodesBulletins(){ return [...new Set(bySoc(this.d.bulletins,this.d).map(b=>b.periode))].sort().reverse(); },
  view_M07(per){
    const d=this.d, periodes=this.periodesBulletins();
    per = per || App._m07per || periodes[0] || "";
    App._m07per=per;
    // Synthèse mensuelle (toutes périodes) — PVID 8,4 % + PF 7 % + AT 2,5 % sur assiette plafonnée
    const parPer={};
    bySoc(d.bulletins,d).forEach(b=>{ const p=parPer[b.periode]||(parPer[b.periode]={n:0,pvid:0,pf:0,at:0,base:0});

  dsfAnnee(annee){

  },

  /* ---------- M12 Temps de travail ---------- */
  // Durée légale : 40 h/sem (Art. 80 CT) => ~173,33 h/mois. Taux horaire = salaireBase / 173,33.
  HEURES_MOIS:173.33,
  // Majorations heures sup. (décret n° 95/677) : 8 premières +20 %, suivantes +30 %,
  // nuit +50 %, dimanche/jour férié +40 %.
  calcHS(salaireBase,hs1,hs2,nuit,dim){
    const th=salaireBase/this.HEURES_MOIS;
    const montant=Math.round(th*(hs1*1.20 + hs2*1.30 + nuit*1.50 + dim*1.40));
    return {th:Math.round(th),heures:hs1+hs2+nuit+dim,montant};
  },
  view_M12(){
    const d=this.d, actifs=bySoc(d.salaries,d).filter(s=>s.statut==="Actif"), list=bySoc(d.temps,d);
    this.set(`
      <h1>Temps de travail</h1><div class="sub">M12 — durée légale 40 h/sem (Art. 80) ; heures sup. majorées (décret 95/677)</div>
      <div class="card noprint"><div class="grid">
        <div><label>Salarié</label><select id="tp_sal" onchange="App.tpCalc()">${actifs.map(s=>`<option value="${s.id}">${esc(s.matricule)} — ${esc(s.nom)} (${fmt(s.salaireBase)})</option>`).join("")||'<option value="">(aucun)</option>'}</select></div>
        <div><label>Période (AAAA-MM)</label><input id="tp_per" value="${new Date().toISOString().slice(0,7)}" oninput="App.tpCalc()"></div>
        <div><label>HS à +20 % (8 prem. h/sem)</label><input id="tp_h1" type="number" value="0" min="0" oninput="App.tpCalc()"></div>
        <div><label>HS à +30 % (au-delà)</label><input id="tp_h2" type="number" value="0" min="0" oninput="App.tpCalc()"></div>
        <div><label>Heures de nuit (+50 %)</label><input id="tp_nuit" type="number" value="0" min="0" oninput="App.tpCalc()"></div>
        <div><label>Dimanche / férié (+40 %)</label><input id="tp_dim" type="number" value="0" min="0" oninput="App.tpCalc()"></div>
      </div>
      <p id="tp_res" class="bull"></p>
      <button class="btn" onclick="App.tpSave()">Enregistrer le pointage</button>
      <span class="muted" style="margin-left:8px">La majoration est reportée automatiquement dans la paie (M03) pour la même période.</span></div>
      <div class="card"><table><thead><tr><th>Salarié</th><th>Période</th><th class="right">Taux horaire</th>
        <th class="right">Heures sup.</th><th class="right">Majoration HS</th><th class="noprint"></th></tr></thead>
      <tbody>${list.length?list.map(t=>{const s=salById(d,t.salarieId)||{};return `
        <tr><td>${esc(s.matricule||"?")} — ${esc(s.nom||"")}</td><td>${esc(t.periode)}</td>
          <td class="right">${fmt(t.th)}</td><td class="right">${t.heures}</td><td class="right">${fmt(t.montant)}</td>
          <td class="noprint"><button class="btn danger sm" onclick="App.tpDel(${t.id})">Suppr.</button></td></tr>`;}).join("")
        :`<tr><td colspan="6" class="muted">Aucun pointage.</td></tr>`}</tbody></table></div>`);
    this.tpCalc();
  },
  tpCalc(){
    const d=this.d, g=id=>Number(document.getElementById(id).value||0);
    const s=salById(d,Number(document.getElementById("tp_sal").value)); if(!s) return;
    const r=this.calcHS(s.salaireBase,g("tp_h1"),g("tp_h2"),g("tp_nuit"),g("tp_dim"));
    document.getElementById("tp_res").innerHTML=`Taux horaire <b>${fmt(r.th)}</b> FCFA · ${r.heures} h sup. · majoration à reporter en paie : <b>${fmt(r.montant)}</b> FCFA`;
  },
  tpSave(){
    const d=this.d, g=id=>Number(document.getElementById(id).value||0);
    const sid=Number(document.getElementById("tp_sal").value), s=salById(d,sid); if(!s) return;
    const per=document.getElementById("tp_per").value;
    const r=this.calcHS(s.salaireBase,g("tp_h1"),g("tp_h2"),g("tp_nuit"),g("tp_dim"));
    // Un seul pointage par salarié + période (remplacement si réédition).
    d.temps=d.temps.filter(x=>!(x.societe===soc(d)&&x.salarieId===sid&&x.periode===per));
    const id=Store.next(d,"temps");
    d.temps.push({id,societe:soc(d),salarieId:sid,periode:per,th:r.th,heures:r.heures,montant:r.montant});
    audit(d,"Pointage (M12)",`${s.matricule} — ${per} — ${r.heures} h sup. — ${fmt(r.montant)}`);
    this.save(); this.go("M12");
  },
  tpDel(id){ const d=this.d; d.temps=d.temps.filter(t=>t.id!==id); this.save(); this.go("M12"); },

  majorationTemps(sid,per){ const t=bySoc(this.d.temps,this.d).find(x=>x.salarieId===sid&&x.periode===per); return t?t.montant:0; },

    const s=salById(d,b.salarieId)||{};
    this.print(`${this.docHead("Bulletin de paie","MLC-RH-BUL-"+id)}
      <p><b>${esc(s.nom)} ${esc(s.prenom||"")}</b> — Matricule ${esc(s.matricule||"")} — CNPS ${esc(s.matCnps||"")}<br>
      Poste : ${esc(s.poste||"")} · Catégorie ${esc(s.categorie||"")} · Période <b>${esc(b.periode)}</b> · Société ${esc(b.societe)}</p>
      ${this.bulletinTable(b)} ${this.docFoot()}`);
  },
  imprimerContrat(sid){
    const d=this.d, s=salById(d,sid); if(!s) return;
    const c=bySoc(d.contrats,d).find(x=>x.salarieId===sid)||{};
    this.print(`${this.docHead("Contrat de travail","MLC-RH-CTR-"+sid)}
      <p>Entre <b>MERCURE LOGISTICS SARL</b> (l'Employeur) et <b>${esc(s.nom)} ${esc(s.prenom||"")}</b> (le Salarié),
      matricule ${esc(s.matricule)}, il est conclu un contrat <b>${esc(c.type||"CDI")}</b> (Art. 25/28 CT).</p>
      <table class="bull"><tbody>
        <tr><td>Poste</td><td>${esc(s.poste||"")} (catégorie ${esc(s.categorie||"")})</td></tr>
        <tr><td>Date d'embauche</td><td>${esc(s.embauche||"")}</td></tr>
        <tr><td>Période d'essai (Art. 34)</td><td>${c.essaiMois||0} mois</td></tr>
        <tr><td>Salaire de base mensuel</td><td>${fmt(s.salaireBase)} FCFA</td></tr>
      </tbody></table>
      <p style="margin-top:30px">Fait à Douala, le ${new Date().toLocaleDateString("fr-FR")}.</p>
      <table style="margin-top:20px"><tr><td>L'Employeur</td><td style="text-align:right">Le Salarié</td></tr></table>
      ${this.docFoot()}`);
  },
  imprimerCertificat(sid){
    const d=this.d, s=salById(d,sid); if(!s) return;
    this.print(`${this.docHead("Certificat de travail","MLC-RH-CERT-"+sid)}
      <p>Nous soussignés, <b>MERCURE LOGISTICS SARL</b>, certifions que <b>${esc(s.nom)} ${esc(s.prenom||"")}</b>
      (matricule ${esc(s.matricule)}) a été employé(e) en qualité de <b>${esc(s.poste||"")}</b>
      à compter du ${esc(s.embauche||"")}.</p>
      <p>Le présent certificat est délivré conformément à l'article 39 du Code du travail camerounais,
      pour servir et valoir ce que de droit.</p>
      <p style="margin-top:30px">Fait à Douala, le ${new Date().toLocaleDateString("fr-FR")}.</p>
      ${this.docFoot()}`);
  },
  imprimerAttestation(sid){
    const d=this.d, s=salById(d,sid); if(!s) return;
    this.print(`${this.docHead("Attestation de travail","MLC-RH-ATT-"+sid)}
      <p>Nous attestons que <b>${esc(s.nom)} ${esc(s.prenom||"")}</b>, matricule ${esc(s.matricule)},
      exerce les fonctions de <b>${esc(s.poste||"")}</b> au sein de MERCURE LOGISTICS SARL
      depuis le ${esc(s.embauche||"")}, et perçoit un salaire de base de ${fmt(s.salaireBase)} FCFA.</p>
      <p>En foi de quoi la présente attestation lui est délivrée pour servir et valoir ce que de droit.</p>
      <p style="margin-top:30px">Fait à Douala, le ${new Date().toLocaleDateString("fr-FR")}.</p>
      ${this.docFoot()}`);
  },
  imprimerDIPE(per){
    const d=this.d, lignes=bySoc(d.bulletins,d).filter(b=>b.periode===per);
    const corps=lignes.map(b=>{const s=salById(d,b.salarieId)||{};return `
      <tr><td>${esc(s.matricule||"?")}</td><td>${esc(s.matCnps||"")}</td><td>${esc(s.nom||"")} ${esc(s.prenom||"")}</td>
      <td class="right">${fmt(b.sbt)}</td><td class="right">${fmt(b.pvidSal+b.pvidPat)}</td>
      <td class="right">${fmt(b.allocFam)}</td><td class="right">${fmt(b.accident)}</td></tr>`;}).join("");
    const tot=lignes.reduce((a,b)=>{a.base+=b.sbt;a.pvid+=b.pvidSal+b.pvidPat;a.pf+=b.allocFam;a.at+=b.accident;return a;},{base:0,pvid:0,pf:0,at:0});
    this.print(`${this.docHead("DIPE — Déclaration CNPS","MLC-RH-DIPE-"+per)}
      <p>Société <b>${esc(soc(d))}</b> — Période <b>${esc(per)}</b> — Effectif déclaré : ${lignes.length}</p>
      <table class="bull"><thead><tr><th>Matricule</th><th>N° CNPS</th><th>Nom</th><th class="right">Assiette</th>
        <th class="right">PVID (8,4 %)</th><th class="right">Alloc. fam.</th><th class="right">Accident</th></tr></thead>
      <tbody>${corps||`<tr><td colspan="7">Aucune ligne.</td></tr>`}
        <tr class="tot"><td colspan="3">TOTAUX</td><td class="right">${fmt(tot.base)}</td><td class="right">${fmt(tot.pvid)}</td>
        <td class="right">${fmt(tot.pf)}</td><td class="right">${fmt(tot.at)}</td></tr>
        <tr class="tot"><td colspan="6">TOTAL COTISATIONS CNPS</td><td class="right">${fmt(tot.pvid+tot.pf+tot.at)}</td></tr></tbody></table>
      ${this.docFoot()}`);
  },
  imprimerDSF(annee){
    const d=this.d, parSal=this.dsfAnnee(annee), ids=Object.keys(parSal);
    const corps=ids.map(id=>{const s=salById(d,Number(id))||{},p=parSal[id];return `
      <tr><td>${esc(s.matricule||"?")}</td><td>${esc(s.nom||"")} ${esc(s.prenom||"")}</td><td class="right">${fmt(p.brut)}</td>
      <td class="right">${fmt(p.irpp)}</td><td class="right">${fmt(p.cac)}</td><td class="right">${fmt(p.cfc)}</td>
      <td class="right">${fmt(p.rav)}</td><td class="right">${fmt(p.tdl)}</td></tr>`;}).join("");
    const tot=ids.reduce((a,id)=>{const p=parSal[id];a.brut+=p.brut;a.irpp+=p.irpp;a.cac+=p.cac;a.cfc+=p.cfc;a.rav+=p.rav;a.tdl+=p.tdl;return a;},
      {brut:0,irpp:0,cac:0,cfc:0,rav:0,tdl:0});
    this.print(`${this.docHead("DSF — Déclaration Statistique et Fiscale","MLC-RH-DSF-"+annee)}
      <p>Société <b>${esc(soc(d))}</b> — Exercice <b>${esc(annee)}</b></p>
      <table class="bull"><thead><tr><th>Matricule</th><th>Nom</th><th class="right">Brut</th><th class="right">IRPP</th>
        <th class="right">CAC</th><th class="right">CFC</th><th class="right">RAV</th><th class="right">TDL</th></tr></thead>
      <tbody>${corps||`<tr><td colspan="8">Aucune ligne.</td></tr>`}
        <tr class="tot"><td colspan="2">TOTAUX ${esc(annee)}</td><td class="right">${fmt(tot.brut)}</td><td class="right">${fmt(tot.irpp)}</td>
        <td class="right">${fmt(tot.cac)}</td><td class="right">${fmt(tot.cfc)}</td><td class="right">${fmt(tot.rav)}</td><td class="right">${fmt(tot.tdl)}</td></tr></tbody></table>
      ${this.docFoot()}`);
  }
};
window.addEventListener("DOMContentLoaded",()=>App.start());
</script>
</body>
</html>
