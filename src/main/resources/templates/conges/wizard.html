<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Congés')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div id="wrap"><nav th:replace="~{fragments/layout :: menu('conges')}"></nav><main>
  <h1>M04 — Congés &amp; absences (W3)</h1>
  <div class="sub">Acquisition 1,5 j/mois (art. 89) — maternité 14 semaines (art. 84)</div>
  <form class="card" th:action="@{/conges}" method="post">
    <div class="row">
      <div><label>Salarié</label><select name="salarieId">
        <option th:each="s : ${salaries}" th:value="${s.id}" th:text="${s.matricule} + ' — ' + ${s.nom}"></option></select></div>
      <div><label>Type</label><select name="type">
        <option>Congé annuel</option><option>Maternité (14 sem.)</option><option>Absence exceptionnelle</option></select></div>
    </div>
    <div class="row"><div><label>Début</label><input type="date" name="debut"></div>
      <div><label>Nombre de jours</label><input type="number" name="jours" value="1"></div></div>
    <div style="margin-top:12px"><button class="btn or" type="submit">Valider le congé</button></div>
  </form>
  <table><thead><tr><th>Salarié (id)</th><th>Type</th><th>Début</th><th>Jours</th><th>Statut</th></tr></thead>
    <tbody><tr th:each="c : ${conges}"><td th:text="${c.salarieId}"></td><td th:text="${c.type}"></td>
      <td th:text="${c.debut}"></td><td th:text="${c.jours}"></td><td th:text="${c.statut}"></td></tr>
      <tr th:if="${#lists.isEmpty(conges)}"><td colspan="5" style="text-align:center;color:#7a8893">Aucune demande.</td></tr></tbody></table>
</main></div></body></html>
