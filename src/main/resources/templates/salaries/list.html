<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments/layout :: head('Salariés')}"></head>
<body>
<div th:replace="~{fragments/layout :: topbar}"></div>
<div id="wrap">
  <nav th:replace="~{fragments/layout :: menu('salaries')}"></nav>
  <main>
    <h1>M01 — Dossiers salariés</h1>
    <div class="sub">Fiches individuelles, matricule interne et CNPS</div>
    <p><a class="btn or" th:href="@{/salaries/nouveau}">+ Nouvelle embauche</a></p>
    <table>
      <thead><tr><th>Matricule</th><th>Nom &amp; prénom</th><th>Poste</th><th>Embauche</th><th class="right">Salaire base</th><th>Statut</th></tr></thead>
      <tbody>
        <tr th:each="s : ${salaries}">
          <td th:text="${s.matricule}"></td>
          <td th:text="${s.nom} + ' ' + ${s.prenom}"></td>
          <td th:text="${s.poste}"></td>
          <td th:text="${s.embauche}"></td>
          <td class="right" th:text="${#numbers.formatInteger(s.salaireBase,0,'POINT')} + ' F'"></td>
          <td><span th:class="'pill ' + (${s.statut=='Actif'}?'ok':'ko')" th:text="${s.statut}"></span></td>
        </tr>
        <tr th:if="${#lists.isEmpty(salaries)}"><td colspan="6" style="text-align:center;color:#7a8893">Aucun salarié.</td></tr>
      </tbody>
    </table>
  </main>
</div>
</body></html>
